name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint + types + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      # CI never makes real LLM calls; tests that need them are marked `evals`
      # and excluded from the default suite.
      OPENAI_API_KEY: "sk-test-not-real"
      DATABASE_URL: "postgresql+asyncpg://marketpulse:marketpulse@localhost:5432/marketpulse"
      REDIS_URL: "redis://localhost:6379/0"
      APP_ENV: "ci"
      APP_TZ: "Asia/Kolkata"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: marketpulse
          POSTGRES_PASSWORD: marketpulse
          POSTGRES_DB: marketpulse
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U marketpulse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Ruff format (check)
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: MyPy strict
        run: mypy backend agents mcp_servers lambdas

      - name: Pytest (unit only)
        run: pytest -q -m "not evals and not e2e"

  langsmith-evals:
    name: LangSmith evals
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Non-blocking — a signal quality regression should not block merges
    continue-on-error: true
    # Only run on push to main (not every PR) to conserve API budget
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      APP_TZ: "Asia/Kolkata"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run LangSmith Evals
        run: python scripts/run_evals.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

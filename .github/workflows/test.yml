name: PR Tests

on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR branch.
concurrency:
  group: pr-test-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + eval gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      OPENAI_API_KEY: "sk-test-not-real"
      DATABASE_URL: "postgresql+asyncpg://marketpulse:marketpulse@localhost:5432/marketpulse"
      REDIS_URL: "redis://localhost:6379/0"
      APP_ENV: "ci"
      APP_TZ: "Asia/Kolkata"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: marketpulse
          POSTGRES_PASSWORD: marketpulse
          POSTGRES_DB: marketpulse
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U marketpulse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/load \
            --ignore=tests/backtesting

      - name: Run evals gate
        run: python scripts/run_evals.py
        continue-on-error: true  # signal-quality regressions warn but don't block the PR
        env:
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
